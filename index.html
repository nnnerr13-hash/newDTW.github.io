<!doctype html>

<html lang="ja">

<head>

  <meta charset="utf-8">

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>DTW操作メモ</title>

  <style>

    html, body {

      margin: 0;

      padding: 0;

      background: #111;

      color: #fff;

      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;

      touch-action: manipulation;

      -webkit-text-size-adjust: 100%;

    }

    body {

      padding: 16px;

      line-height: 1.7;

      font-size: 18px;

    }

    .box {

      max-width: 720px;

      margin: 0 auto;

      background: #1c1c1c;

      border-radius: 14px;

      padding: 16px;

    }

    button, a {

      font-size: 18px;

      padding: 12px 16px;

      border-radius: 10px;

      border: 0;

      margin: 6px 0;

      display: inline-block;

    }

    a {

      color: #8fd3ff;

    }

  </style>

</head>

<body>

  <div class="box">

    <h1>DTW操作メモ</h1>

    <p>S / 射撃<br>

    C / 方向<br>

    X / キャンセル</p>

    <p>Sp / 地図<br>

    A / メニュー<br>

    Z / 攻撃・選択<br>

    X / Hold</p>

    <p>BGMのYouTubeリンク<br>

    ※広告と音量に注意</p>

    <p>データ消去<br>

    デバッグ：攻略済みにする</p>

  </div>

  <script>

    // iPhoneでダブルタップ拡大・二重反応を減らす

    let lastTouchEnd = 0;

    document.addEventListener("touchend", function (event) {

      const now = Date.now();

      if (now - lastTouchEnd <= 300) {

        event.preventDefault();

      }

      lastTouchEnd = now;

    }, { passive: false });

  </script>

</body>

</html>
